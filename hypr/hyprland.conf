# =============================================================================
# HYPRLAND CONFIG - CACHYOS / IAN - 2026
# =============================================================================


#VARIAVEIS DE AMBIENTE (DARKMODE)
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark" # for GTK3
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

#desktop/session info
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

#GTK backend
env = GDK_BACKEND,wayland,x11,*

#Qt
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_SISABLE_WINDOWDECORATION,1
env = QT_STYLE_OVERRIDE,kvantum

#GTK / Libadwaita
env= GTK_APLICATION_PERFER_DARK_THEME,1
env = GTK_APPEARANCE_PREFERENCE,dark

#VARIÁVEIS PRINCIPAIS
$mainMod = SUPER
$terminal = kitty
$fileManager = nautilus
$menu = ~/.config/rofi/launchers/type-4/launcher.sh
$powermenu = ~/.config/rofi/applets/bin/powermenu.sh
$browser = zen-browser
$waybar = ~/.config/waybar/scripts/refresh.sh

#CONFIGURAÇÃO DE MONITORES
# Detecta automaticamente a resolução e taxa de atualização nativa do laptop
monitor=,highres,auto,1

#AUTOSTART
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = bluetoothctl power off
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = hypridle

#LOOK & FEEL
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(FFFDF9e6) rgba(EFE6DCe6) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle # Mantém o comportamento clássico de mosaico dividindo a tela
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

#ATALHOS DE TECLADO ESSENCIAIS

# Aplicativos e Sistema
bind = $mainMod, T, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, togglefloating, 
bind = $mainMod, F, fullscreen, 1 # Tela cheia inteligente (mantém gaps)
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, B, exec, $browser
bind = $mainMod, P, exec, $powermenu
bind = $mainMod, W, exec, $waybar
bind = $mainMod, L, exec, hyprlock

#print binds
bind = , Print, exec, grim - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -

# Mover o foco entre as janelas (Vim style ou Setas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mover as janelas de lugar dentro do mosaico
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Alternar entre os Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Mover a janela ativa para um Workspace específico
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Controle do Mouse (Segure SUPER + Botão Esquerdo para mover, Direito para redimensionar)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Controle de Áudio e Brilho (Teclas multimídia do Laptop)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua



#configurações de teclado e touchpad
input {
    kb_layout = br
    kb_variant = ,
    kb_model = thinkpad

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true     # Ativa o clique com um toque leve no touchpad
        disable_while_typing = true # Evita cliques acidentais enquanto você digita código
    }
}
